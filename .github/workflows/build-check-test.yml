name: build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-check:
    name: Build-check-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Java / Gradle ----
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2.4.2

      # ---- R ----
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies for build
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 5
          needs: build
          working-directory: rDNA/rDNA
          extra-packages: |
            any::roxygen2

      # ---- LaTeX / pandoc ----
      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Update TinyTeX and install LaTeX packages
        run: |
          tlmgr update --self
          tlmgr install ec cm-super urlbst psnfss courier times helvetic

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Check pandoc version
        run: pandoc --version

      # ---- Build everything ----
      - name: Build all components with Gradle
        run: ./gradlew build

      # ---- Check and test rDNA package ----
      - name: Run R CMD check (Gradle-built tarball)
        if: runner.os != 'Linux'
        working-directory: build
        shell: bash
        run: |
          R CMD check --as-cran rDNA_*.tar.gz

      - name: Run R CMD check without tests on Linux
        if: runner.os == 'Linux'
        working-directory: build
        shell: bash
        run: |
          R CMD check --as-cran --no-tests rDNA_*.tar.gz

      # ---- Upload artifacts ----
      - name: Upload bibliography artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bibliography-${{ matrix.os }}
          path: build/bibliography.*

      - name: Upload DNA JAR
        uses: actions/upload-artifact@v4
        with:
          name: dna-jar-${{ matrix.os }}
          path: build/*.jar

      - name: Upload rDNA source package
        uses: actions/upload-artifact@v4
        with:
          name: rDNA-package-${{ matrix.os }}
          path: build/*.tar.gz

      - name: Upload R check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: R-CMD-check-${{ matrix.os }}
          path: |
            build/*.Rcheck/**
            build/00check.log
